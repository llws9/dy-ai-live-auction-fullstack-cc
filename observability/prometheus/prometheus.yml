global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'auction-monitor'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  # Prometheus 自身监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Gateway 服务
  - job_name: 'gateway'
    static_configs:
      - targets: ['gateway:8080']
    metrics_path: /metrics

  # Product 服务
  - job_name: 'product'
    static_configs:
      - targets: ['product:8081']
    metrics_path: /metrics

  # Auction 服务
  - job_name: 'auction'
    static_configs:
      - targets: ['auction:8082']
    metrics_path: /metrics

  # 本地开发配置
  - job_name: 'local-services'
    static_configs:
      - targets:
          - 'host.docker.internal:8080'  # Gateway
          - 'host.docker.internal:8081'  # Product
          - 'host.docker.internal:8082'  # Auction
    metrics_path: /metrics
