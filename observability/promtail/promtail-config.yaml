server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # 采集 Docker 容器日志
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: "/(.*)"
        target_label: container
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
      - source_labels: [__meta_docker_container_label_service_name]
        target_label: service_name
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            service_name: service_name
            request_id: request_id
            operation_type: operation_type
            object_type: object_type
            object_id: object_id
            user_id: user_id
            user_name: user_name
            success: success
            error_msg: error_msg
            client_ip: client_ip
            method: method
            path: path
            status: status
      - labels:
          service_name:
          request_id:
          operation_type:
          object_type:
          success:
          method:
      - timestamp:
          source: timestamp
          format: RFC3339Nano

  # 采集文件日志（本地开发用）
  - job_name: gateway_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: gateway
          service_name: gateway
          __path__: /var/log/gateway/*.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            service_name: service_name
            request_id: request_id
            operation_type: operation_type
      - labels:
          service_name:
          request_id:
          operation_type:
      - timestamp:
          source: timestamp
          format: RFC3339Nano

  - job_name: product_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: product
          service_name: product
          __path__: /var/log/product/*.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            service_name: service_name
            request_id: request_id
      - labels:
          service_name:
          request_id:
      - timestamp:
          source: timestamp
          format: RFC3339Nano

  - job_name: auction_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: auction
          service_name: auction
          __path__: /var/log/auction/*.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            service_name: service_name
            request_id: request_id
      - labels:
          service_name:
          request_id:
      - timestamp:
          source: timestamp
          format: RFC3339Nano
