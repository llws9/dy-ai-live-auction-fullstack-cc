openapi: 3.0.3
info:
  title: Notification API
  description: 消息通知系统API，用于用户通知的获取、标记已读等操作
  version: 1.0.0

servers:
  - url: http://localhost:8080/api/v1
    description: Development server

paths:
  /notifications:
    get:
      summary: 获取用户通知列表
      description: 获取当前用户的通知列表，支持分页
      tags:
        - Notification
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          description: 页码，从1开始
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: page_size
          in: query
          description: 每页数量
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: unread_only
          in: query
          description: 仅未读通知
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: 成功获取通知列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationListResponse'
        '401':
          description: 未授权

  /notifications/unread-count:
    get:
      summary: 获取未读通知数量
      description: 获取当前用户的未读通知总数
      tags:
        - Notification
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功获取未读数量
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnreadCountResponse'
        '401':
          description: 未授权

  /notifications/{id}/read:
    put:
      summary: 标记通知已读
      description: 将指定通知标记为已读
      tags:
        - Notification
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: 通知ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 标记成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: 未授权
        '404':
          description: 通知不存在

  /notifications/read-all:
    put:
      summary: 标记所有通知已读
      description: 将当前用户的所有未读通知标记为已读
      tags:
        - Notification
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 标记成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: 未授权

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Notification:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: 通知ID
        type:
          type: string
          enum: [bid_outbid, auction_won, auction_lost, order_paid, order_shipped, order_completed]
          description: 通知类型
        title:
          type: string
          description: 通知标题
        content:
          type: string
          description: 通知内容
        data:
          type: object
          additionalProperties: true
          description: 扩展数据
        read_at:
          type: string
          format: date-time
          nullable: true
          description: 已读时间
        created_at:
          type: string
          format: date-time
          description: 创建时间

    NotificationListResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/Notification'
            total:
              type: integer
              description: 总数量
            page:
              type: integer
              description: 当前页
            page_size:
              type: integer
              description: 每页数量

    UnreadCountResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          type: object
          properties:
            count:
              type: integer
              description: 未读数量

    SuccessResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
