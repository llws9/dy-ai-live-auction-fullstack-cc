# Product Service Configuration
server:
  port: ":8081"

database:
  host: "mysql"
  port: 3306
  user: "root"
  password: "root"
  name: "auction"
  max_idle_conns: 10
  max_open_conns: 100

redis:
  addr: "redis:6379"
  password: ""
  pool_size: 50

services:
  auction_service_url: "http://auction:8082"

llm:
  provider: "doubao"
  timeout_ms: 60000
  doubao:
    base_url: "https://ark.cn-beijing.volces.com/api/v3"
    api_key: "${ARK_API_KEY}"
    model: "doubao-seed-1-6-vision-250815"
