groups:
  - name: system_alerts
    interval: 30s
    rules:
      # CPU使用率告警
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
          category: system
        annotations:
          summary: "高CPU使用率 - {{ $labels.instance }}"
          description: "CPU使用率 {{ $value }}% 已超过80%阈值,持续5分钟"
          runbook_url: "https://wiki.example.com/runbooks/high-cpu"

      - alert: CriticalCPUUsage
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 95
        for: 2m
        labels:
          severity: critical
          category: system
        annotations:
          summary: "严重CPU使用率 - {{ $labels.instance }}"
          description: "CPU使用率 {{ $value }}% 已超过95%阈值,持续2分钟,需要立即处理"

      # 内存使用率告警
      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
          category: system
        annotations:
          summary: "高内存使用率 - {{ $labels.instance }}"
          description: "内存使用率 {{ $value }}% 已超过85%阈值,持续5分钟"

      - alert: CriticalMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 95
        for: 2m
        labels:
          severity: critical
          category: system
        annotations:
          summary: "严重内存使用率 - {{ $labels.instance }}"
          description: "内存使用率 {{ $value }}% 已超过95%阈值,持续2分钟"

      # 磁盘使用率告警
      - alert: HighDiskUsage
        expr: (1 - (node_filesystem_avail_bytes{fstype!="tmpfs"} / node_filesystem_size_bytes{fstype!="tmpfs"})) * 100 > 85
        for: 5m
        labels:
          severity: warning
          category: system
        annotations:
          summary: "高磁盘使用率 - {{ $labels.instance }}"
          description: "磁盘 {{ $labels.mountpoint }} 使用率 {{ $value }}% 已超过85%阈值"

      - alert: CriticalDiskUsage
        expr: (1 - (node_filesystem_avail_bytes{fstype!="tmpfs"} / node_filesystem_size_bytes{fstype!="tmpfs"})) * 100 > 95
        for: 2m
        labels:
          severity: critical
          category: system
        annotations:
          summary: "严重磁盘使用率 - {{ $labels.instance }}"
          description: "磁盘 {{ $labels.mountpoint }} 使用率 {{ $value }}% 已超过95%阈值"

      # 磁盘IO等待时间告警
      - alert: HighDiskIOWait
        expr: irate(node_cpu_seconds_total{mode="iowait"}[5m]) * 100 > 20
        for: 5m
        labels:
          severity: warning
          category: system
        annotations:
          summary: "高磁盘IO等待 - {{ $labels.instance }}"
          description: "IO等待时间 {{ $value }}% 已超过20%阈值"

  - name: application_alerts
    interval: 15s
    rules:
      # 请求错误率告警
      - alert: HighErrorRate
        expr: |
          sum(rate(http_requests_total{status=~"5.."}[1m])) by (service)
          /
          sum(rate(http_requests_total[1m])) by (service) * 100 > 1
        for: 1m
        labels:
          severity: critical
          category: application
        annotations:
          summary: "高错误率 - {{ $labels.service }}"
          description: "服务 {{ $labels.service }} 错误率 {{ $value }}% 已超过1%阈值"

      # 响应时间告警
      - alert: HighResponseTimeP99
        expr: histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[2m])) by (le, service)) > 0.5
        for: 2m
        labels:
          severity: warning
          category: application
        annotations:
          summary: "高响应时间P99 - {{ $labels.service }}"
          description: "服务 {{ $labels.service }} P99响应时间 {{ $value }}s 已超过500ms阈值"

      - alert: CriticalResponseTimeP99
        expr: histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[2m])) by (le, service)) > 2
        for: 1m
        labels:
          severity: critical
          category: application
        annotations:
          summary: "严重响应时间P99 - {{ $labels.service }}"
          description: "服务 {{ $labels.service }} P99响应时间 {{ $value }}s 已超过2s阈值"

      # QPS异常告警
      - alert: LowRequestRate
        expr: sum(rate(http_requests_total[5m])) by (service) < 1
        for: 5m
        labels:
          severity: warning
          category: application
        annotations:
          summary: "低请求率 - {{ $labels.service }}"
          description: "服务 {{ $labels.service }} 请求率 {{ $value }} req/s 可能服务异常"

      - alert: HighRequestRate
        expr: sum(rate(http_requests_total[5m])) by (service) > 1000
        for: 2m
        labels:
          severity: warning
          category: application
        annotations:
          summary: "高请求率 - {{ $labels.service }}"
          description: "服务 {{ $labels.service }} 请求率 {{ $value }} req/s 需要扩容"

      # 并发连接数告警
      - alert: HighConcurrentConnections
        expr: node_netstat_Tcp_CurrEstab > 1000
        for: 5m
        labels:
          severity: warning
          category: application
        annotations:
          summary: "高并发连接数 - {{ $labels.instance }}"
          description: "并发连接数 {{ $value }} 已超过1000阈值"

  - name: business_alerts
    interval: 30s
    rules:
      # 在线用户数告警
      - alert: LowOnlineUsers
        expr: live_auction_online_users < 10
        for: 10m
        labels:
          severity: info
          category: business
        annotations:
          summary: "低在线用户数"
          description: "当前在线用户数 {{ $value }} 可能系统异常"

      # 活跃竞拍告警
      - alert: NoActiveAuctions
        expr: live_auction_active_auctions == 0
        for: 30m
        labels:
          severity: info
          category: business
        annotations:
          summary: "无活跃竞拍"
          description: "当前无活跃竞拍,可能系统异常"

      # 出价频率异常告警
      - alert: LowBidFrequency
        expr: rate(live_auction_bids_total[5m]) < 0.1
        for: 10m
        labels:
          severity: warning
          category: business
        annotations:
          summary: "低出价频率"
          description: "出价频率 {{ $value }} bids/s 可能系统异常"

      - alert: HighBidFrequency
        expr: rate(live_auction_bids_total[5m]) > 100
        for: 2m
        labels:
          severity: warning
          category: business
        annotations:
          summary: "高出价频率"
          description: "出价频率 {{ $value }} bids/s 需要关注"

      # 订单转化率告警
      - alert: LowOrderConversionRate
        expr: |
          sum(rate(live_auction_orders_total[1h])) / sum(rate(live_auction_bids_total[1h])) * 100 < 5
        for: 1h
        labels:
          severity: warning
          category: business
        annotations:
          summary: "低订单转化率"
          description: "订单转化率 {{ $value }}% 已低于5%阈值"

  - name: database_alerts
    interval: 30s
    rules:
      # PostgreSQL连接数告警
      - alert: HighPostgresConnections
        expr: pg_stat_activity_count / pg_settings_max_connections * 100 > 80
        for: 5m
        labels:
          severity: warning
          category: database
        annotations:
          summary: "高PostgreSQL连接数"
          description: "PostgreSQL连接数使用率 {{ $value }}% 已超过80%阈值"

      # PostgreSQL慢查询告警
      - alert: PostgresSlowQueries
        expr: pg_stat_statements_mean_exec_time_seconds > 1
        for: 5m
        labels:
          severity: warning
          category: database
        annotations:
          summary: "PostgreSQL慢查询"
          description: "PostgreSQL平均查询时间 {{ $value }}s 已超过1s阈值"

      # PostgreSQL复制延迟告警
      - alert: PostgresReplicationLag
        expr: pg_replication_lag_seconds > 10
        for: 2m
        labels:
          severity: critical
          category: database
        annotations:
          summary: "PostgreSQL复制延迟"
          description: "PostgreSQL复制延迟 {{ $value }}s 已超过10s阈值"

      # Redis内存使用率告警
      - alert: HighRedisMemoryUsage
        expr: redis_memory_used_bytes / redis_memory_max_bytes * 100 > 85
        for: 5m
        labels:
          severity: warning
          category: database
        annotations:
          summary: "高Redis内存使用率"
          description: "Redis内存使用率 {{ $value }}% 已超过85%阈值"

      # Redis连接数告警
      - alert: HighRedisConnections
        expr: redis_connected_clients / redis_config_maxclients * 100 > 80
        for: 5m
        labels:
          severity: warning
          category: database
        annotations:
          summary: "高Redis连接数"
          description: "Redis连接数使用率 {{ $value }}% 已超过80%阈值"

      # Redis键空间命中率告警
      - alert: LowRedisHitRate
        expr: |
          rate(redis_keyspace_hits_total[5m]) / (rate(redis_keyspace_hits_total[5m]) + rate(redis_keyspace_misses_total[5m])) * 100 < 80
        for: 10m
        labels:
          severity: warning
          category: database
        annotations:
          summary: "低Redis命中率"
          description: "Redis命中率 {{ $value }}% 已低于80%阈值"

  - name: container_alerts
    interval: 30s
    rules:
      # 容器CPU使用率告警
      - alert: HighContainerCPU
        expr: |
          sum(rate(container_cpu_usage_seconds_total{container!=""}[5m])) by (container_label_com_docker_compose_service)
          /
          sum(container_spec_cpu_quota / container_spec_cpu_period) by (container_label_com_docker_compose_service) * 100 > 80
        for: 5m
        labels:
          severity: warning
          category: container
        annotations:
          summary: "高容器CPU使用率 - {{ $labels.container_label_com_docker_compose_service }}"
          description: "容器CPU使用率 {{ $value }}% 已超过80%阈值"

      # 容器内存使用率告警
      - alert: HighContainerMemory
        expr: |
          sum(container_memory_usage_bytes{container!=""}) by (container_label_com_docker_compose_service)
          /
          sum(container_spec_memory_limit_bytes) by (container_label_com_docker_compose_service) * 100 > 85
        for: 5m
        labels:
          severity: warning
          category: container
        annotations:
          summary: "高容器内存使用率 - {{ $labels.container_label_com_docker_compose_service }}"
          description: "容器内存使用率 {{ $value }}% 已超过85%阈值"

      # 容器重启告警
      - alert: ContainerRestart
        expr: increase(container_restart_count[1h]) > 0
        for: 1m
        labels:
          severity: warning
          category: container
        annotations:
          summary: "容器重启 - {{ $labels.container_label_com_docker_compose_service }}"
          description: "容器在过去1小时内重启了 {{ $value }} 次"

      # 容器退出状态告警
      - alert: ContainerExitNonZero
        expr: container_exit_status != 0
        for: 1m
        labels:
          severity: critical
          category: container
        annotations:
          summary: "容器异常退出 - {{ $labels.container_label_com_docker_compose_service }}"
          description: "容器以非零状态码 {{ $value }} 退出"

  - name: service_availability_alerts
    interval: 15s
    rules:
      # 服务不可用告警
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
          category: availability
        annotations:
          summary: "服务不可用 - {{ $labels.job }}"
          description: "服务 {{ $labels.instance }} 已经不可用超过1分钟"

      # 健康检查失败告警
      - alert: HealthCheckFailed
        expr: probe_success == 0
        for: 2m
        labels:
          severity: critical
          category: availability
        annotations:
          summary: "健康检查失败 - {{ $labels.instance }}"
          description: "服务健康检查失败,实例 {{ $labels.instance }}"

      # SSL证书即将过期告警
      - alert: SSLCertificateExpiringSoon
        expr: (probe_ssl_earliest_cert_expiry - time()) / 86400 < 7
        for: 1h
        labels:
          severity: warning
          category: availability
        annotations:
          summary: "SSL证书即将过期"
          description: "SSL证书将在 {{ $value }} 天后过期"
