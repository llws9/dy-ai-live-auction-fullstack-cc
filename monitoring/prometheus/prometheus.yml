global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'live-auction-monitor'
    environment: 'production'

# Alertmanager配置
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# 规则文件
rule_files:
  - 'alerts.yml'
  - 'recording_rules.yml'

# 抓取配置
scrape_configs:
  # Prometheus自身监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          instance: 'prometheus'

  # Node Exporter - 系统指标
  - job_name: 'node-exporter'
    static_configs:
      - targets:
          - 'node-exporter:9100'
        labels:
          service: 'system'

  # 后端服务监控
  - job_name: 'backend-api'
    metrics_path: /metrics
    static_configs:
      - targets:
          - 'backend:3000'
        labels:
          service: 'backend'
          tier: 'api'

  # PostgreSQL监控
  - job_name: 'postgres-exporter'
    static_configs:
      - targets:
          - 'postgres-exporter:9187'
        labels:
          service: 'database'
          db_type: 'postgres'

  # Redis监控
  - job_name: 'redis-exporter'
    static_configs:
      - targets:
          - 'redis-exporter:9121'
        labels:
          service: 'cache'
          db_type: 'redis'

  # Nginx监控
  - job_name: 'nginx-exporter'
    static_configs:
      - targets:
          - 'nginx-exporter:9113'
        labels:
          service: 'webserver'

  # WebSocket服务监控
  - job_name: 'websocket-service'
    metrics_path: /metrics
    static_configs:
      - targets:
          - 'websocket:3001'
        labels:
          service: 'websocket'
          tier: 'realtime'

  # cAdvisor - 容器监控
  - job_name: 'cadvisor'
    static_configs:
      - targets:
          - 'cadvisor:8080'
        labels:
          service: 'containers'

  # Blackbox Exporter - 探测服务
  - job_name: 'blackbox-http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - 'http://backend:3000/health'
          - 'http://websocket:3001/health'
        labels:
          probe: 'http'
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
