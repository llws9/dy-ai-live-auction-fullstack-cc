definitions:
  dao.AuctionStatistics:
    properties:
      avg_bid_count:
        type: number
      success_rate:
        type: number
      top_auctions:
        items:
          $ref: '#/definitions/dao.AuctionSummary'
        type: array
      total_auctions:
        type: integer
    type: object
  dao.AuctionSummary:
    properties:
      bid_count:
        type: integer
      final_price:
        type: number
      id:
        type: integer
      title:
        type: string
    type: object
  dao.BidRange:
    properties:
      count:
        type: integer
      range:
        type: string
    type: object
  dao.CategoryRevenue:
    properties:
      category:
        type: string
      percentage:
        type: number
      revenue:
        type: number
    type: object
  dao.DailyRevenue:
    properties:
      date:
        type: string
      revenue:
        type: number
    type: object
  dao.OverviewStatistics:
    properties:
      active_users:
        type: integer
      success_rate:
        type: number
      total_auctions:
        type: integer
      total_revenue:
        type: number
      total_users:
        type: integer
    type: object
  dao.RevenueStatistics:
    properties:
      category_distribution:
        items:
          $ref: '#/definitions/dao.CategoryRevenue'
        type: array
      daily_revenue:
        items:
          $ref: '#/definitions/dao.DailyRevenue'
        type: array
      total_revenue:
        type: number
    type: object
  dao.UserStatistics:
    properties:
      active_users:
        type: integer
      bid_distribution:
        items:
          $ref: '#/definitions/dao.BidRange'
        type: array
      new_users:
        type: integer
      total_users:
        type: integer
    type: object
  model.Order:
    properties:
      auction_id:
        type: integer
      completed_at:
        type: string
      created_at:
        type: string
      final_price:
        type: number
      id:
        type: integer
      paid_at:
        type: string
      product_id:
        type: integer
      shipped_at:
        type: string
      status:
        $ref: '#/definitions/model.OrderStatus'
      updated_at:
        type: string
      winner_id:
        type: integer
    type: object
  model.OrderStatus:
    enum:
    - 0
    - 1
    - 2
    - 3
    type: integer
    x-enum-comments:
      OrderStatusCompleted: 已完成
      OrderStatusPaid: 已支付
      OrderStatusPending: 待支付
      OrderStatusShipped: 已发货
    x-enum-descriptions:
    - 待支付
    - 已支付
    - 已发货
    - 已完成
    x-enum-varnames:
    - OrderStatusPending
    - OrderStatusPaid
    - OrderStatusShipped
    - OrderStatusCompleted
  model.Product:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      images:
        items:
          type: string
        type: array
      name:
        type: string
      status:
        $ref: '#/definitions/model.ProductStatus'
    type: object
  model.ProductStatus:
    enum:
    - 0
    - 1
    type: integer
    x-enum-comments:
      ProductStatusDraft: 草稿
      ProductStatusPublished: 已发布
    x-enum-descriptions:
    - 草稿
    - 已发布
    x-enum-varnames:
    - ProductStatusDraft
    - ProductStatusPublished
  service.CreateProductRequest:
    properties:
      description:
        type: string
      images:
        items:
          type: string
        type: array
      name:
        maxLength: 128
        type: string
    required:
    - name
    type: object
  service.UpdateProductRequest:
    properties:
      description:
        type: string
      images:
        items:
          type: string
        type: array
      name:
        type: string
    type: object
info:
  contact: {}
paths:
  /orders:
    get:
      description: 获取订单列表，支持按用户筛选和分页
      parameters:
      - description: 用户ID
        in: query
        name: user_id
        type: integer
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页数量
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: 获取订单列表
      tags:
      - order
  /orders/{id}:
    get:
      description: 获取指定订单的详细信息
      parameters:
      - description: 订单ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Order'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      summary: 获取订单详情
      tags:
      - order
  /orders/{id}/pay:
    post:
      description: 支付指定订单（Mock实现）
      parameters:
      - description: 订单ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Order'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 支付订单
      tags:
      - order
  /orders/{id}/ship:
    post:
      description: 发货指定订单（Mock实现）
      parameters:
      - description: 订单ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Order'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 发货
      tags:
      - order
  /products:
    get:
      description: 获取商品列表，支持按状态筛选和分页
      parameters:
      - description: 商品状态：0-下架, 1-上架
        in: query
        name: status
        type: integer
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页数量
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: 获取商品列表
      tags:
      - product
    post:
      consumes:
      - application/json
      description: 创建新商品
      parameters:
      - description: 商品信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/service.CreateProductRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.Product'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 创建商品
      tags:
      - product
  /products/{id}:
    delete:
      description: 删除指定商品
      parameters:
      - description: 商品ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 删除商品
      tags:
      - product
    get:
      description: 获取指定商品的详细信息
      parameters:
      - description: 商品ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Product'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      summary: 获取商品详情
      tags:
      - product
    put:
      consumes:
      - application/json
      description: 更新指定商品的信息
      parameters:
      - description: 商品ID
        in: path
        name: id
        required: true
        type: integer
      - description: 商品更新信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/service.UpdateProductRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Product'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 更新商品
      tags:
      - product
  /statistics/auctions:
    get:
      description: 获取竞拍相关的统计数据
      parameters:
      - description: 开始日期
        in: query
        name: start_date
        type: string
      - description: 结束日期
        in: query
        name: end_date
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dao.AuctionStatistics'
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 获取竞拍统计
      tags:
      - statistics
  /statistics/overview:
    get:
      description: 获取管理后台首页大屏的统计数据
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dao.OverviewStatistics'
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 获取统计总览
      tags:
      - statistics
  /statistics/revenue:
    get:
      description: 获取收入相关的统计数据
      parameters:
      - description: 开始日期
        in: query
        name: start_date
        type: string
      - description: 结束日期
        in: query
        name: end_date
        type: string
      - description: 商品类目
        in: query
        name: category
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dao.RevenueStatistics'
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 获取收入统计
      tags:
      - statistics
  /statistics/users:
    get:
      description: 获取用户相关的统计数据
      parameters:
      - description: 开始日期
        in: query
        name: start_date
        type: string
      - description: 结束日期
        in: query
        name: end_date
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dao.UserStatistics'
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 获取用户统计
      tags:
      - statistics
swagger: "2.0"
