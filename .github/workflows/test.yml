name: Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install H5 dependencies
        run: npm ci
        working-directory: frontend/h5

      - name: Run H5 unit tests
        run: npm test -- --coverage
        working-directory: frontend/h5

      - name: Upload H5 coverage
        uses: actions/upload-artifact@v3
        with:
          name: h5-coverage
          path: frontend/h5/coverage

      - name: Install Admin dependencies
        run: npm ci
        working-directory: frontend/admin

      - name: Run Admin unit tests
        run: npm test -- --coverage
        working-directory: frontend/admin

      - name: Upload Admin coverage
        uses: actions/upload-artifact@v3
        with:
          name: admin-coverage
          path: frontend/admin/coverage

  e2e-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci
        working-directory: frontend/h5

      - name: Install Playwright browsers
        run: npx playwright install --with-deps
        working-directory: frontend/h5

      - name: Run E2E tests
        run: npx playwright test
        working-directory: frontend/h5

      - name: Upload Playwright report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: playwright-report
          path: frontend/h5/playwright-report

  build:
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Build H5
        run: |
          npm ci
          npm run build
        working-directory: frontend/h5

      - name: Build Admin
        run: |
          npm ci
          npm run build
        working-directory: frontend/admin
