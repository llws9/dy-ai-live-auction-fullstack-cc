<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>竞拍成功动画原型 - v2</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            /* Light Theme */
            --bg-body: #F3F4F6;
            --bg-card: #FFFFFF;
            --text-main: #111827;
            --text-muted: #6B7280;
            --accent: #F59E0B; /* Gold/Orange */
            --accent-glow: rgba(245, 158, 11, 0.2);
            --border: #E5E7EB;
        }
        [data-theme="dark"] {
            /* Dark Theme */
            --bg-body: #09090B;
            --bg-card: #18181B;
            --text-main: #FAFAFA;
            --text-muted: #A1A1AA;
            --accent: #FBBF24;
            --accent-glow: rgba(251, 191, 36, 0.15);
            --border: #27272A;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s ease, color 0.3s ease;
            overflow: hidden;
            perspective: 1200px;
        }

        .app-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- 1. Intro Animation (Gavel & Confetti) --- */
        .intro-container {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            pointer-events: none;
        }
        .gavel-wrapper {
            transform-origin: bottom right;
            animation: gavel-smash 1.2s cubic-bezier(0.2, 0, 0, 1) forwards;
        }
        @keyframes gavel-smash {
            0% { transform: rotate(0deg) scale(1.5) translateY(-150px) translateX(100px); opacity: 0; }
            15% { transform: rotate(35deg) scale(1.5) translateY(-180px) translateX(120px); opacity: 1; }
            30% { transform: rotate(40deg) scale(1.5) translateY(-180px) translateX(120px); opacity: 1; }
            40% { transform: rotate(-45deg) scale(1.5) translateY(20px) translateX(0px); opacity: 1; } /* impact */
            70% { transform: rotate(-45deg) scale(1.5) translateY(20px) translateX(0px); opacity: 1; }
            100% { transform: rotate(-45deg) scale(1.5) translateY(20px) translateX(0px); opacity: 0; }
        }

        .shockwave {
            position: absolute;
            width: 150px;
            height: 40px;
            border-radius: 50%;
            border: 8px solid var(--accent);
            top: calc(50% + 80px);
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
            animation: shockwave-expand 0.6s 0.48s ease-out forwards;
        }
        @keyframes shockwave-expand {
            0% { transform: translate(-50%, -50%) scale(0.2); opacity: 1; border-width: 20px; }
            100% { transform: translate(-50%, -50%) scale(3.5); opacity: 0; border-width: 0px; }
        }

        .shake-trigger {
            animation: shake 0.5s 0.48s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
        }
        @keyframes shake {
            0%, 100% { transform: translate3d(0, 0, 0); }
            10%, 50%, 90% { transform: translate3d(-12px, 10px, 0); }
            30%, 70% { transform: translate3d(12px, -10px, 0); }
        }

        .ribbon {
            position: absolute;
            top: calc(50% + 40px);
            left: 50%;
            opacity: 0;
            animation: ribbon-burst 1.5s 0.48s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        .shape-rect { width: 14px; height: 14px; }
        .shape-circle { width: 14px; height: 14px; border-radius: 50%; }
        .shape-long { width: 8px; height: 28px; border-radius: 4px; }

        @keyframes ribbon-burst {
            0% { transform: translate(-50%, -50%) rotate(0deg) scale(1); opacity: 0; }
            1% { opacity: 1; }
            50% { transform: translate(calc(-50% + var(--tx) * 0.8), calc(-50% + var(--ty) - 120px)) rotate(calc(var(--rot) * 0.5)) scale(1); opacity: 1; }
            100% { transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty) + 200px)) rotate(var(--rot)) scale(0.5); opacity: 0; }
        }

        /* --- 2. Shared Card Styles --- */
        .card-container {
            position: relative;
            z-index: 10;
        }
        .auction-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            width: 360px;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            position: relative;
            overflow: hidden;
            opacity: 0; /* Hidden initially, revealed by animation */
        }
        [data-theme="dark"] .auction-card {
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }

        .product-image {
            width: 120px;
            height: 120px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--border), var(--bg-body));
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 14px;
            position: relative;
            z-index: 2;
        }

        .price {
            font-size: 32px;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 8px;
            font-variant-numeric: tabular-nums;
            position: relative;
            z-index: 2;
        }
        .title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
            position: relative;
            z-index: 2;
        }
        .subtitle {
            font-size: 14px;
            color: var(--text-muted);
            position: relative;
            z-index: 2;
        }

        /* --- V1: Classic Celebration --- */
        .v1-anim {
            animation: card-appear 0.6s 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }
        @keyframes card-appear {
            0% { transform: scale(0.6) translateY(60px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }
        .v1-stamp {
            position: absolute;
            top: 24px;
            right: 24px;
            width: 80px;
            height: 80px;
            border: 4px solid var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-weight: 800;
            font-size: 18px;
            transform: rotate(-15deg) scale(2);
            opacity: 0;
            animation: v1-stamp-in 0.5s 1.1s cubic-bezier(0.175, 0.885, 0.32, 1.5) both;
            z-index: 10;
        }
        @keyframes v1-stamp-in {
            0% { transform: rotate(-30deg) scale(3); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: rotate(-15deg) scale(1); opacity: 1; }
        }

        /* --- V2: Premium Glow --- */
        .v2-anim {
            animation: v2-fade-up 0.8s 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
            box-shadow: 0 0 40px var(--accent-glow);
            border-color: var(--accent-glow);
        }
        @keyframes v2-fade-up {
            0% { transform: translateY(40px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        .v2-sweep {
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent);
            transform: skewX(-20deg);
            animation: v2-sweep-anim 2s 1.0s cubic-bezier(0.4, 0, 0.2, 1) both;
            pointer-events: none;
            z-index: 1;
        }
        [data-theme="dark"] .v2-sweep {
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
        }
        @keyframes v2-sweep-anim {
            0% { left: -100%; }
            100% { left: 200%; }
        }
        .v2-price {
            background: linear-gradient(90deg, var(--accent), #FCD34D);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: v2-glow 2s infinite alternate;
        }

        /* --- V3: Gamified Dynamic --- */
        .v3-anim {
            animation: v3-flip-in 0.7s 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }
        @keyframes v3-flip-in {
            0% { transform: rotateX(60deg) translateY(60px) scale(0.7); opacity: 0; }
            100% { transform: rotateX(0) translateY(0) scale(1); opacity: 1; }
        }
        .v3-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background-color: var(--accent);
            color: #fff;
            padding: 6px 16px;
            border-radius: 99px;
            font-weight: 700;
            margin-bottom: 24px;
            animation: v3-bounce 1.5s 1.5s infinite;
            position: relative;
            z-index: 2;
        }
        @keyframes v3-bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-8px); }
            60% { transform: translateY(-4px); }
        }

        /* --- Tweaks Panel --- */
        .tweaks-panel {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            width: 300px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 16px;
            font-size: 14px;
        }
        .tweaks-header {
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }
        .tweaks-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .tweaks-row label {
            color: var(--text-muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .tweaks-row select {
            background: var(--bg-body);
            color: var(--text-main);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px;
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            outline: none;
        }
        .btn-replay {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            transition: opacity 0.2s, transform 0.1s;
        }
        .btn-replay:hover { opacity: 0.9; }
        .btn-replay:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Intro Animation (Gavel Smash + Confetti Burst) ---
        const IntroAnimation = () => {
            const [ribbons, setRibbons] = useState([]);
            
            useEffect(() => {
                const colors = ['#F59E0B', '#EF4444', '#10B981', '#3B82F6', '#8B5CF6', '#EC4899', '#FCD34D'];
                const shapes = ['rect', 'circle', 'long'];
                
                const newRibbons = Array.from({ length: 80 }).map((_, i) => {
                    const angle = (Math.random() * Math.PI * 2); // Full circle explosion
                    const velocity = 300 + Math.random() * 500;
                    const shape = shapes[Math.floor(Math.random() * shapes.length)];
                    
                    return {
                        id: i,
                        color: colors[Math.floor(Math.random() * colors.length)],
                        shape,
                        tx: `${Math.cos(angle) * velocity}px`,
                        ty: `${Math.sin(angle) * velocity}px`,
                        rot: `${(Math.random() - 0.5) * 1080}deg`,
                    };
                });
                setRibbons(newRibbons);
            }, []);

            return (
                <div className="intro-container">
                    <div className="gavel-wrapper">
                        <svg width="200" height="200" viewBox="0 0 100 100" fill="none" style={{ filter: 'drop-shadow(0 15px 25px rgba(0,0,0,0.3))' }}>
                            {/* Handle */}
                            <rect x="44" y="30" width="12" height="55" rx="4" fill="#8B5A2B" />
                            <rect x="44" y="30" width="6" height="55" rx="2" fill="#6B4423" />
                            {/* Head */}
                            <rect x="15" y="15" width="70" height="34" rx="8" fill="var(--accent)" />
                            <rect x="10" y="20" width="12" height="24" rx="4" fill="#D97706" />
                            <rect x="78" y="20" width="12" height="24" rx="4" fill="#D97706" />
                            {/* Golden Band */}
                            <rect x="42" y="15" width="16" height="34" fill="#FDE68A" />
                        </svg>
                    </div>
                    <div className="shockwave" />
                    {ribbons.map(r => (
                        <div 
                            key={r.id}
                            className={`ribbon shape-${r.shape}`}
                            style={{
                                backgroundColor: r.color,
                                '--tx': r.tx,
                                '--ty': r.ty,
                                '--rot': r.rot,
                            }}
                        />
                    ))}
                </div>
            );
        };

        // --- V1 Component: 经典欢庆 ---
        const ClassicAnimation = () => {
            return (
                <div className="auction-card v1-anim">
                    <div className="v1-stamp">成交</div>
                    <div className="product-image">[ 商品图片 ]</div>
                    <div className="title">限量版机械腕表</div>
                    <div className="subtitle">最终成交价</div>
                    <div className="price">¥ 12,500</div>
                </div>
            );
        };

        // --- V2 Component: 尊享高奢 ---
        const PremiumAnimation = () => {
            return (
                <div className="auction-card v2-anim">
                    <div className="v2-sweep"></div>
                    <div className="product-image" style={{ borderRadius: '50%', background: 'linear-gradient(135deg, #FCD34D, var(--bg-body))', border: '1px solid var(--accent)' }}>
                        [ 高奢藏品 ]
                    </div>
                    <div className="subtitle" style={{ letterSpacing: '3px', textTransform: 'uppercase' }}>Congratulations</div>
                    <div className="title" style={{ fontSize: '24px', margin: '16px 0' }}>成功竞得该拍品</div>
                    <div className="price v2-price">¥ 88,000</div>
                </div>
            );
        };

        // --- V3 Component: 游戏动感 ---
        const GamifiedAnimation = () => {
            return (
                <div className="auction-card v3-anim" style={{ border: '2px solid var(--accent)' }}>
                    <div className="v3-badge">
                        <i data-lucide="zap" style={{ width: 16, height: 16 }}></i>
                        竞拍成功!
                    </div>
                    <div className="product-image" style={{ transform: 'rotate(-5deg)', boxShadow: '4px 4px 0 var(--accent)', border: '2px solid var(--text-main)' }}>
                        [ 潮玩手办 ]
                    </div>
                    <div className="title">绝版盲盒手办</div>
                    <div className="price" style={{ fontSize: '40px', fontStyle: 'italic', textShadow: '2px 2px 0 var(--text-main)' }}>¥ 899</div>
                    <div className="subtitle">击败了 124 名竞拍者</div>
                </div>
            );
        };

        const App = () => {
            const [version, setVersion] = useState('v1');
            const [theme, setTheme] = useState('light');
            const [replayKey, setReplayKey] = useState(1);

            useEffect(() => {
                document.documentElement.setAttribute('data-theme', theme);
            }, [theme]);

            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            });

            const handleReplay = () => setReplayKey(k => k + 1);

            return (
                <div className={`app-wrapper ${replayKey ? 'shake-trigger' : ''}`} key={`wrapper-${replayKey}`}>
                    {/* The hammer and confetti blast */}
                    <IntroAnimation key={`intro-${replayKey}`} />

                    {/* The resulting card */}
                    <div className="card-container" key={`card-${replayKey}`}>
                        {version === 'v1' && <ClassicAnimation />}
                        {version === 'v2' && <PremiumAnimation />}
                        {version === 'v3' && <GamifiedAnimation />}
                    </div>

                    <div className="tweaks-panel">
                        <div className="tweaks-header">
                            <span>控制面板 (Tweaks)</span>
                        </div>
                        <div className="tweaks-row">
                            <label>动画版本 (Animation Variant)</label>
                            <select value={version} onChange={e => { setVersion(e.target.value); handleReplay(); }}>
                                <option value="v1">V1 - 经典欢庆 (印章+全屏彩屑)</option>
                                <option value="v2">V2 - 尊享高奢 (流光+全屏彩屑)</option>
                                <option value="v3">V3 - 游戏动感 (3D翻转+全屏彩屑)</option>
                            </select>
                        </div>
                        <div className="tweaks-row">
                            <label>系统 UI (Theme)</label>
                            <select value={theme} onChange={e => setTheme(e.target.value)}>
                                <option value="light">Light Mode (浅色模式)</option>
                                <option value="dark">Dark Mode (深色模式)</option>
                            </select>
                        </div>
                        <div style={{ marginTop: '4px' }}>
                            <button className="btn-replay" onClick={handleReplay}>
                                重新播放 (Replay)
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
